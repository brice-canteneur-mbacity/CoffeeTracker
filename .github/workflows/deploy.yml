name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution à la fois ; ne pas annuler une exécution en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish (Blazor WASM standalone)
        run: dotnet publish CoffeeTracker.csproj -c Release -o release --nologo

      # GitHub Pages servira l'app sous /<repo>/, il faut donc patcher le <base href> et
      # les chemins absolus du service-worker registration et de Leaflet en chemins relatifs.
      - name: Adjust base href for GitHub Pages
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|g" release/wwwroot/index.html
          echo "Base href updated to /${REPO_NAME}/"
          grep -n "<base href" release/wwwroot/index.html

      # Fallback SPA : GitHub Pages sert 404.html quand l'URL ne correspond pas à un fichier
      # statique ; en faisant pointer 404.html vers index.html, le router Blazor reprend la main.
      - name: Create SPA fallback (404.html)
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      # Sans ce fichier, GitHub Pages applique Jekyll qui ignore tout dossier commençant par
      # un underscore, dont le critique _framework/ généré par Blazor.
      - name: Disable Jekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
